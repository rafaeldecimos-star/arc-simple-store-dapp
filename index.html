<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Faucet & Token Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    :root {
      --arc-blue: #0052FF;
      --arc-blue-hover: #0045D8;
      --arc-bg: #0B0F19;
      --arc-card-bg: #151C2C;
      --arc-text-primary: #FFFFFF;
      --arc-text-secondary: #94A3B8;
      --arc-border: rgba(255, 255, 255, 0.08);
      --arc-success: #10B981;
      --arc-danger: #EF4444;
      --arc-shadow: 0 12px 32px rgba(0, 82, 255, 0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--arc-bg);
      color: var(--arc-text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: var(--arc-card-bg);
      padding: 36px;
      border-radius: 20px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--arc-shadow);
      border: 1px solid var(--arc-border);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--arc-text-secondary);
      text-align: center;
      margin-bottom: 24px;
    }

    .status-badge {
      font-size: 13px;
      color: var(--arc-text-secondary);
      text-align: center;
      margin-bottom: 20px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid var(--arc-border);
      word-break: break-all;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin: 20px 0;
    }

    /* Alteração no fundo da caixa de saldo para Azul Arc */
    .stat-box {
      background: var(--arc-blue);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 82, 255, 0.3);
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 700;
    }

    /* Alteração da cor do texto do saldo para PRETO */
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #000000;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .usdc-icon {
      width: 28px;
      height: 28px;
      vertical-align: middle;
    }

    button {
      background: var(--arc-blue);
      color: #FFF;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--arc-blue-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      background: rgba(255, 255, 255, 0.1);
      color: var(--arc-text-secondary);
      cursor: not-allowed;
      transform: none;
    }

    #logMessage {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💧 Arc USDC Faucet</h1>
    <div class="subtitle">Resgate USDC de teste na Arc Testnet</div>
    
    <div id="walletStatus" class="status-badge">Carteira: Não Conectada</div>

    <button id="connectBtn" onclick="connectWallet()">Conectar Carteira</button>

    <div class="dashboard-grid">
      <div class="stat-box">
        <div class="stat-label">Seu Saldo USDC</div>
        <div class="stat-value" id="userBalance">
          <svg class="usdc-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="16" fill="#2775CA"/>
            <path d="M16 4C9.37 4 4 9.37 4 16C4 22.63 9.37 28 16 28C22.63 28 28 22.63 28 16C28 9.37 22.63 4 16 4ZM16.8 21.8V23.5H15.2V21.8C12.8 21.5 11.2 20.1 11.1 18.2H13.2C13.3 19.3 14.3 20.1 16 20.1C17.6 20.1 18.5 19.3 18.5 18.3C18.5 17.2 17.7 16.7 15.6 16.2C13.1 15.6 11.4 14.6 11.4 12.3C11.4 10.3 13.1 9 15.2 8.6V7H16.8V8.6C18.9 8.9 20.3 10.2 20.4 12H18.3C18.2 11 17.3 10.3 16 10.3C14.6 10.3 13.7 11 13.7 12C13.7 13 14.5 13.4 16.5 13.9C19.2 14.6 20.8 15.6 20.8 18C20.8 20.2 19.1 21.4 16.8 21.8Z" fill="white"/>
          </svg>
          <span>0.0 USDC</span>
        </div>
      </div>
    </div>

    <button id="faucetBtn" onclick="requestTokens()" disabled>Resgatar 10 USDC</button>
    <div id="logMessage"></div>
  </div>

  <script>
    // Endereço do contrato implantado na Arc Testnet
    const contractAddress = "0xe21Da15088C0cEc0Ea7b3d011d3Fce511dEDD0C6";

    const contractABI = [
      "function balanceOf(address account) public view returns (uint256)",
      "function requestTokens() external",
      "function getTimeUntilNextClaim(address user) external view returns (uint256)"
    ];

    let provider, signer, contract, userAddress;

    const usdcIconSvg = `<svg class="usdc-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="16" fill="#2775CA"/>
      <path d="M16 4C9.37 4 4 9.37 4 16C4 22.63 9.37 28 16 28C22.63 28 28 22.63 28 16C28 9.37 22.63 4 16 4ZM16.8 21.8V23.5H15.2V21.8C12.8 21.5 11.2 20.1 11.1 18.2H13.2C13.3 19.3 14.3 20.1 16 20.1C17.6 20.1 18.5 19.3 18.5 18.3C18.5 17.2 17.7 16.7 15.6 16.2C13.1 15.6 11.4 14.6 11.4 12.3C11.4 10.3 13.1 9 15.2 8.6V7H16.8V8.6C18.9 8.9 20.3 10.2 20.4 12H18.3C18.2 11 17.3 10.3 16 10.3C14.6 10.3 13.7 11 13.7 12C13.7 13 14.5 13.4 16.5 13.9C19.2 14.6 20.8 15.6 20.8 18C20.8 20.2 19.1 21.4 16.8 21.8Z" fill="white"/>
    </svg>`;

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Por favor, instale uma carteira Web3 (MetaMask ou Rabby)!");
        return;
      }

      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("walletStatus").innerText = `Conectado: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("faucetBtn").disabled = false;

        contract = new ethers.Contract(contractAddress, contractABI, signer);
        
        await updateDashboard();
      } catch (err) {
        console.error("Erro ao conectar:", err);
        showLog("Erro ao conectar carteira.", "red");
      }
    }

    async function updateDashboard() {
      if (!contract || !userAddress) return;

      try {
        const rawBalance = await contract.balanceOf(userAddress);
        const formattedBalance = ethers.utils.formatUnits(rawBalance, 18);
        document.getElementById("userBalance").innerHTML = `${usdcIconSvg} <span>${formattedBalance} USDC</span>`;

        const timeRemaining = await contract.getTimeUntilNextClaim(userAddress);
        const faucetBtn = document.getElementById("faucetBtn");

        if (timeRemaining > 0) {
          const hours = Math.floor(timeRemaining / 3600);
          const minutes = Math.floor((timeRemaining % 3600) / 60);
          faucetBtn.disabled = true;
          faucetBtn.innerText = `Aguarde ${hours}h ${minutes}m`;
        } else {
          faucetBtn.disabled = false;
          faucetBtn.innerText = "Resgatar 10 USDC";
        }
      } catch (err) {
        console.error("Erro ao atualizar o painel:", err);
      }
    }

    async function requestTokens() {
      if (!contract) return;

      try {
        showLog("Enviando transação...", "#94A3B8");
        const tx = await contract.requestTokens();
        showLog("Aguardando confirmação na rede...", "#94A3B8");
        
        await tx.wait();
        showLog("🎉 10 USDC recebidos com sucesso!", "#10B981");
        
        await updateDashboard();
      } catch (err) {
        console.error("Erro no resgate:", err);
        showLog("Erro ou transação rejeitada.", "#EF4444");
      }
    }

    function showLog(msg, color) {
      const logDiv = document.getElementById("logMessage");
      logDiv.innerText = msg;
      logDiv.style.color = color;
    }
  </script>
</body>
</html>
