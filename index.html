<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Faucet & Token Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    :root {
      --primary: #0052FF;
      --bg: #0F172A;
      --card-bg: #1E293B;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --success: #10B981;
      --danger: #EF4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 22px;
      margin-top: 0;
      text-align: center;
      color: #FFF;
    }

    .status-badge {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 20px;
      word-break: break-all;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin: 20px 0;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--success);
      margin-top: 5px;
    }

    button {
      background: var(--primary);
      color: #FFF;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    #logMessage {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚰 Arc Faucet & Dashboard</h1>
    <div id="walletStatus" class="status-badge">Carteira: Não Conectada</div>

    <button id="connectBtn" onclick="connectWallet()">Conectar Carteira</button>

    <div class="dashboard-grid">
      <div class="stat-box">
        <div class="stat-label">Seu Saldo ABT</div>
        <div class="stat-value" id="userBalance">0.0 ABT</div>
      </div>
    </div>

    <button id="faucetBtn" onclick="requestTokens()" disabled>Resgatar 100 ABT</button>
    <div id="logMessage"></div>
  </div>

  <script>
    // Endereço do contrato implantado na Arc Testnet
    const contractAddress = "0xe21Da15088C0cEc0Ea7b3d011d3Fce511dEDD0C6";

    const contractABI = [
      "function balanceOf(address account) public view returns (uint256)",
      "function requestTokens() external",
      "function getTimeUntilNextClaim(address user) external view returns (uint256)"
    ];

    let provider, signer, contract, userAddress;

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Por favor, instale uma carteira Web3 (MetaMask ou Rabby)!");
        return;
      }

      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        document.getElementById("walletStatus").innerText = `Conectado: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        document.getElementById("connectBtn").style.display = "none";
        document.getElementById("faucetBtn").disabled = false;

        contract = new ethers.Contract(contractAddress, contractABI, signer);
        
        await updateDashboard();
      } catch (err) {
        console.error("Erro ao conectar:", err);
        showLog("Erro ao conectar carteira.", "red");
      }
    }

    async function updateDashboard() {
      if (!contract || !userAddress) return;

      try {
        const rawBalance = await contract.balanceOf(userAddress);
        const formattedBalance = ethers.utils.formatUnits(rawBalance, 18);
        document.getElementById("userBalance").innerText = `${formattedBalance} ABT`;

        const timeRemaining = await contract.getTimeUntilNextClaim(userAddress);
        const faucetBtn = document.getElementById("faucetBtn");

        if (timeRemaining > 0) {
          const hours = Math.floor(timeRemaining / 3600);
          const minutes = Math.floor((timeRemaining % 3600) / 60);
          faucetBtn.disabled = true;
          faucetBtn.innerText = `Aguarde ${hours}h ${minutes}m`;
        } else {
          faucetBtn.disabled = false;
          faucetBtn.innerText = "Resgatar 100 ABT";
        }
      } catch (err) {
        console.error("Erro ao atualizar o painel:", err);
      }
    }

    async function requestTokens() {
      if (!contract) return;

      try {
        showLog("Enviando transação...", "#94A3B8");
        const tx = await contract.requestTokens();
        showLog("Aguardando confirmação na rede...", "#94A3B8");
        
        await tx.wait();
        showLog("🎉 100 ABT recebidos com sucesso!", "#10B981");
        
        await updateDashboard();
      } catch (err) {
        console.error("Erro no resgate:", err);
        showLog("Erro ou transação rejeitada.", "#EF4444");
      }
    }

    function showLog(msg, color) {
      const logDiv = document.getElementById("logMessage");
      logDiv.innerText = msg;
      logDiv.style.color = color;
    }
  </script>
</body>
</html>
