<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Faucet & Token Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --arc-blue: #0052FF;
            --arc-blue-hover: #0045D8;
            --arc-bg: #0B0F19;
            --arc-card-bg: #151C2C;
            --arc-text-primary: #FFFFFF;
            --arc-text-secondary: #94A3B8;
            --arc-border: rgba(255, 255, 255, 0.08);
            --arc-success: #10B981;
            --arc-danger: #EF4444;
            --arc-shadow: 0 12px 32px rgba(0, 82, 255, 0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--arc-bg);
            color: var(--arc-text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--arc-card-bg);
            padding: 36px;
            border-radius: 20px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--arc-shadow);
            border: 1px solid var(--arc-border);
        }

        /* Layout em flexbox com espaçamento entre o título e o logo oposto */
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: -0.5px;
        }

        .title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .arc-official-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        .subtitle {
            font-size: 13px;
            color: var(--arc-text-secondary);
            text-align: center;
            margin-bottom: 24px;
        }

        .status-badge {
            font-size: 13px;
            color: var(--arc-text-secondary);
            text-align: center;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid var(--arc-border);
            word-break: break-all;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        /* Fundo Branco na caixa de saldo */
        .stat-box {
            background: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        /* Nome em Azul Arc */
        .stat-label {
            font-size: 11px;
            color: var(--arc-blue);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
        }

        /* Valor do saldo em 18px */
        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: #000000;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .usdc-icon {
            width: 24px;
            height: 24px;
            vertical-align: middle;
        }

        button {
            background: var(--arc-blue);
            color: #FFF;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--arc-blue-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--arc-text-secondary);
            cursor: not-allowed;
            transform: none;
        }

        #logMessage {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>
            <span class="title-left">💧 Arc USDC Faucet</span>
            <!-- Símbolo Oficial da Arc no lado direito -->
            <svg class="arc-official-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="50" fill="#0052FF"/>
                <path d="M50 20L78 72H63L50 48L37 72H22L50 20Z" fill="white"/>
            </svg>
        </h1>
        <div class="subtitle">Resgate USDC de teste na Arc Testnet</div>

        <div id="walletStatus" class="status-badge">Carteira: Não Conectada</div>

        <button id="connectBtn" onclick="connectWallet()">Conectar Carteira</button>

        <div class="dashboard-grid">
            <div class="stat-box">
                <div class="stat-label">Seu Saldo USDC</div>
                <div class="stat-value" id="userBalance">
                    <svg class="usdc-icon" viewBox="0 0 2000 2000" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="1000" cy="1000" r="1000" fill="#2775CA"/>
                        <path d="M1275 1140c0-105-62-142-187-165-92-17-110-33-110-72 0-38 32-62 89-62 52 0 83 18 97 58 5 13 16 22 30 22h52c16 0 30-13 28-29-14-80-73-138-154-150v-82c0-16-13-30-30-30h-60c-16 0-30 13-30 30v80c-98 12-160 76-160 162 0 108 67 143 186 166 84 17 111 36 111 74 0 47-42 68-98 68-71 0-101-28-112-68-4-15-17-25-32-25h-55c-17 0-30 14-27 31 16 88 80 144 163 158v81c0 16 13 30 30 30h60c16 0 30-13 30-30v-81c98-14 162-79 162-170z" fill="#FFF"/>
                        <path d="M1000 200c-441 0-800 359-800 800s359 800 800 800 800-359 800-800-359-800-800-800zm0 1450c-358 0-650-292-650-650s292-650 650-650 650 292 650 650-292 650-650 650z" fill="#FFF"/>
                    </svg>
                    <span>0.0 USDC</span>
                </div>
            </div>
        </div>

        <button id="faucetBtn" onclick="requestTokens()" disabled>Resgatar 10 USDC</button>

        <div id="logMessage"></div>
    </div>

    <script>
        const contractAddress = "0xe21Da15088C0cEc0Ea7b3d011d3Fce511dEDD0C6";
        const contractABI = [
            "function balanceOf(address account) public view returns (uint256)",
            "function requestTokens() external",
            "function getTimeUntilNextClaim(address user) external view returns (uint256)"
        ];

        let provider, signer, contract, userAddress;

        const usdcIconSvg = `<svg class="usdc-icon" viewBox="0 0 2000 2000" xmlns="http://www.w3.org/2000/svg">
            <circle cx="1000" cy="1000" r="1000" fill="#2775CA"/>
            <path d="M1275 1140c0-105-62-142-187-165-92-17-110-33-110-72 0-38 32-62 89-62 52 0 83 18 97 58 5 13 16 22 30 22h52c16 0 30-13 28-29-14-80-73-138-154-150v-82c0-16-13-30-30-30h-60c-16 0-30 13-30 30v80c-98 12-160 76-160 162 0 108 67 143 186 166 84 17 111 36 111 74 0 47-42 68-98 68-71 0-101-28-112-68-4-15-17-25-32-25h-55c-17 0-30 14-27 31 16 88 80 144 163 158v81c0 16 13 30 30 30h60c16 0 30-13 30-30v-81c98-14 162-79 162-170z" fill="#FFF"/>
            <path d="M1000 200c-441 0-800 359-800 800s359 800 800 800 800-359 800-800-359-800-800-800zm0 1450c-358 0-650-292-650-650s292-650 650-650 650 292 650 650-292 650-650 650z" fill="#FFF"/>
        </svg>`;

        async function connectWallet() {
            if (!window.ethereum) {
                alert("Por favor, instale uma carteira Web3 (MetaMask ou Rabby)!");
                return;
            }

            try {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                document.getElementById("walletStatus").innerText = `Conectado: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
                document.getElementById("connectBtn").style.display = "none";
                document.getElementById("faucetBtn").disabled = false;

                contract = new ethers.Contract(contractAddress, contractABI, signer);
                await updateDashboard();
            } catch (err) {
                console.error("Erro ao conectar:", err);
                showLog("Erro ao conectar carteira.", "#EF4444");
            }
        }

        async function updateDashboard() {
            if (!contract || !userAddress) return;

            try {
                const rawBalance = await contract.balanceOf(userAddress);
                const formattedBalance = ethers.utils.formatUnits(rawBalance, 18);

                document.getElementById("userBalance").innerHTML = `${usdcIconSvg} <span>${formattedBalance} USDC</span>`;

                const timeRemaining = await contract.getTimeUntilNextClaim(userAddress);
                const faucetBtn = document.getElementById("faucetBtn");

                if (timeRemaining > 0) {
                    const hours = Math.floor(timeRemaining / 3600);
                    const minutes = Math.floor((timeRemaining % 3600) / 60);
                    faucetBtn.disabled = true;
                    faucetBtn.innerText = `Aguarde ${hours}h ${minutes}m`;
                } else {
                    faucetBtn.disabled = false;
                    faucetBtn.innerText = "Resgatar 10 USDC";
                }
            } catch (err) {
                console.error("Erro ao atualizar o painel:", err);
            }
        }

        async function requestTokens() {
            if (!contract) return;

            try {
                showLog("Enviando transação...", "#94A3B8");
                const tx = await contract.requestTokens();
                showLog("Aguardando confirmação na rede...", "#94A3B8");
                await tx.wait();
                showLog("🎉 10 USDC recebidos com sucesso!", "#10B981");
                await updateDashboard();
            } catch (err) {
                console.error("Erro no resgate:", err);
                showLog("Erro ou transação rejeitada.", "#EF4444");
            }
        }

        function showLog(msg, color) {
            const logDiv = document.getElementById("logMessage");
            logDiv.innerText = msg;
            logDiv.style.color = color;
        }
    </script>
</body>
</html>
